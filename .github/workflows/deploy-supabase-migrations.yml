name: Deploy Supabase Migrations

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "supabase/migrations/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-supabase-migrations.yml"

permissions:
  contents: read

concurrency:
  group: supabase-production-migrations
  cancel-in-progress: false

jobs:
  deploy:
    name: Validate and deploy database migrations
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required secrets
        shell: bash
        run: |
          set -euo pipefail
          for name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF SUPABASE_DB_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              echo "::error::$name is missing"
              exit 1
            fi
          done
          echo "Required Supabase deployment secrets are configured."

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link production project
        shell: bash
        run: |
          set -euo pipefail
          supabase link --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Preview pending migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD"

      - name: Apply pending migrations
        shell: bash
        run: |
          set -euo pipefail
          supabase db push --linked --password "$SUPABASE_DB_PASSWORD" --yes

      - name: Verify migration state
        shell: bash
        run: |
          set -euo pipefail
          output="$(supabase db push --linked --dry-run --password "$SUPABASE_DB_PASSWORD")"
          printf '%s\n' "$output"
          if printf '%s' "$output" | grep -qi "would be applied"; then
            echo "::error::Pending migrations remain after deployment."
            exit 1
          fi
          echo "Supabase production migrations are up to date."
